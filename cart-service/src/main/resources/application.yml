spring:
  application:
    name: cart-service

  datasource:
    url: jdbc:mysql://localhost:3306/booknest_cart?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
